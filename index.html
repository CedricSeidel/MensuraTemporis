<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mensura Temporis</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontend/css/main.css">
    <link rel="stylesheet" href="frontend/css/token.css">
    <link rel="stylesheet" href="frontend/css/navbar.css">

</head>
<header>
    <nav class="nav-bar">
        <!-- Logo (Links) -->
        <div class="navbar-logo">
            <a href="#">Mensura Temporis</a>
        </div>

        <!-- Navigation Links (Mitte) -->
        <div class="nav-bar-links-container">
            <a class="nav-bar-links" href="#">
                <span class="nav-button__hotkey" style="opacity: 0.6">[D]</span>
                Date</a>
            <a class="nav-bar-links" href="#">
                <span class="nav-button__hotkey" style="opacity: 0.6">[C] </span>
                    Create</a>
            <a class="nav-bar-links" href="#">
                <span class="nav-button__hotkey" style="opacity: 0.6">[H]</span>
                    Help</a>
        </div>

        <!-- Profil/Login (Rechts) -->
        <div class="navbar-profile">
            <div class="profile-container">
                <img src="frontend/assets/img/profile-simple.svg" alt="Profilbild" class="profile-image" id="profileImage">
                <div class="profile-tooltip" id="profileTooltip">Profile</div>
            </div>
            <div class="fingerprint-container">
                <img src="frontend/assets/img/fingerabdruck.png" alt="Fingerabdruck" class="fingerprint-image" id="fingerprintImage">
                <div class="fingerprint-tooltip" id="fingerprintTooltip">Login</div>
            </div>
        </div>
    </nav>
</header>

<body>
    <div class="grid">
            <div class="container1">
                <h1>Calendar</h1>
                <p></p>
            </div>

            <div class="container2">
                <h2>Upcoming Events</h2>
                <p></p>
            </div>

            <div class="container3">
                <h2>Weather</h2>
                <p></p>
            </div>

            <div class="container4">
                <h2>Quick Notes</h2>
                <p></p>
            </div>

            <div class="container5">
                <h2>Help</h2>
                <p></p>
            </div>

            <div class="container6">
                <h2>Settings</h2>
                <p></p>
            </div>
    </div>




    <script src="frontend/js/profile.js"></script>
    <script src="frontend/js/hotkeys.js"></script>
    <script type="module">
        import { CardExpansion } from './frontend/js/cardExpansion.js';

        // Initialisiere CardExpansion für alle Container
        document.querySelectorAll('[class^="container"]').forEach(container => {
            new CardExpansion(container);
        });
    </script>

</body>
</html>
